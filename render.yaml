# Render Blueprint — Biznes Xabar backend (FastAPI + pipeline + bot)
# Ma'lumotlar bazasi: Neon (DATABASE_URL qo'lda kiritiladi).
services:
  - type: web
    name: biznes-xabar-backend
    env: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false          # Neon connection string (Dashboard'da kiritiladi)
      - key: GEMINI_API_KEY
        sync: false
      - key: ADMIN_TOKEN
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHANNEL_ID
        value: "@biznesxabari"
      - key: AUTO_PUBLISH
        value: "true"
      - key: AUTO_TELEGRAM
        value: "true"
      - key: AUTO_TELEGRAM_MIN_IMPORTANCE
        value: "4"
      - key: PIPELINE_INTERVAL
        value: "3600"
      - key: FRONTEND_ORIGIN
        value: "https://biznesxabar.uz"
      - key: SITE_URL
        value: "https://biznesxabar.uz"
